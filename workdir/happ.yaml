manifest_version: '0'
name: holochain-ballot
description: Lightweight voting hApp — elections, registration, ballots, tallies on Holochain.
roles:
  - name: voting
    provisioning:
      strategy: create
      deferred: false
    dna:
      path: ../dnas/voting/workdir/voting.dna
      modifiers:
        network_seed: null
        properties: null
      installed_hash: null
      clone_limit: 0
allow_deferred_memproofs: false
