name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  docker-tryorama:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build WASM (Nix)
        run: docker compose -f docker/docker-compose.yml run --rm build-wasm

      - name: Pack DNA + hApp
        run: docker compose -f docker/docker-compose.yml run --rm pack-happ

      - name: Tryorama tests
        run: docker compose -f docker/docker-compose.yml run --rm tryorama
